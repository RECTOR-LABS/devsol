name: devsol

services:
  api:
    build: .
    image: ghcr.io/rector-labs/devsol:latest
    container_name: devsol-api
    restart: unless-stopped
    ports:
      - "${DEVSOL_PORT:-7003}:3100"
    volumes:
      - devsol-data:/app/data
    env_file:
      - .env
    environment:
      - DEVSOL_DB_PATH=/app/data/devsol.db

volumes:
  devsol-data:
