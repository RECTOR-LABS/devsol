server {
    if ($host = devsol.rectorspace.com) {
        return 301 https://$host$request_uri;
    }

    listen 80;
    server_name devsol.rectorspace.com;
    return 404;
}

server {
    listen 443 ssl;
    server_name devsol.rectorspace.com;
    server_tokens off;

    ssl_certificate /etc/letsencrypt/live/devsol.rectorspace.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/devsol.rectorspace.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    root /home/devsol/www;
    index index.html;

    # Serve index.html at root only, 404 for unknown paths
    location = / {
        try_files /index.html =404;
    }

    location / {
        try_files $uri $uri/ =404;
    }

    # API proxy to backend (Docker maps to 7003)
    location /api/ {
        proxy_pass http://127.0.0.1:7003/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Serve .md files as plain text
    location ~* \.md$ {
        default_type text/plain;
        charset utf-8;
    }

    # Cache static assets
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }
}
